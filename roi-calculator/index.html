<script>
let L='en',S=1,lastResults=null;
function setLang(l){L=l;document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.textContent.trim()===l.toUpperCase()));document.documentElement.lang=l;document.querySelectorAll('[data-'+l+']').forEach(e=>{e.innerHTML=e.getAttribute('data-'+l)});document.querySelectorAll('[data-placeholder-'+l+']').forEach(e=>{e.placeholder=e.getAttribute('data-placeholder-'+l)});document.querySelectorAll('select option').forEach(o=>{const v=o.getAttribute('data-'+l);if(v)o.textContent=v});document.title=l==='sl'?'Kalkulator ROI digitalizacije — Promigra':'Manufacturing ROI Calculator — Promigra'}

function clearErrors(){document.querySelectorAll('.val-err').forEach(e=>e.classList.remove('show'));document.querySelectorAll('.ir.err').forEach(e=>e.classList.remove('err'))}

function showErr(id,fields){
    clearErrors();
    const el=document.getElementById(id);if(el){el.classList.add('show');setLang(L)}
    if(fields)fields.forEach(f=>{const inp=document.getElementById(f);if(inp){const wrap=inp.closest('.ir');if(wrap)wrap.classList.add('err')}});
}

function validateStep1(){
    const e=document.getElementById('iEmp').value,m=document.getElementById('iMach').value,c=document.getElementById('iLC').value;
    const missing=[];
    if(!e)missing.push('iEmp');if(!m)missing.push('iMach');if(!c)missing.push('iLC');
    if(missing.length>0){showErr('v1',missing);return false}
    clearErrors();return true;
}

function nav(n){
    S=n;document.querySelectorAll('.sp').forEach(p=>p.classList.remove('on'));document.getElementById('s'+n).classList.add('on');
    for(let i=1;i<=4;i++){const s=document.getElementById('si'+i);s.classList.remove('on','ok');if(i<n)s.classList.add('ok');else if(i===n)s.classList.add('on')}
    window.scrollTo({top:0,behavior:'smooth'});
}

function go(n){
    if(n>1&&!validateStep1())return;
    clearErrors();
    nav(n);
}

document.querySelectorAll('.mi').forEach(e=>{e.addEventListener('click',ev=>{if(ev.target.tagName==='INPUT')return;const cb=e.querySelector('input');cb.checked=!cb.checked;e.classList.toggle('on',cb.checked)})});
document.querySelectorAll('.rg').forEach(g=>{g.querySelectorAll('.rp').forEach(p=>{p.addEventListener('click',()=>{g.querySelectorAll('.rp').forEach(x=>x.classList.remove('on'));p.classList.add('on')})})});
const iS=document.getElementById('iIC'),iD=document.getElementById('icD');iS.addEventListener('input',()=>{iD.textContent=Number(iS.value).toLocaleString('de-DE')+' €'});
function fmt(n){return Math.round(n).toLocaleString('de-DE')+' €'}
function mods(){return[...document.querySelectorAll('.mi input:checked')].map(c=>c.value)}

// Clear errors when user starts typing in flagged fields
document.querySelectorAll('#iEmp,#iMach,#iLC').forEach(inp=>{inp.addEventListener('input',()=>{const wrap=inp.closest('.ir');if(wrap)wrap.classList.remove('err');if(!document.querySelector('.ir.err')){document.querySelectorAll('.val-err').forEach(e=>e.classList.remove('show'))}})});

function calc(){
    if(!validateStep1()){showErr('v3');nav(3);return}
    clearErrors();

    const emp=+document.getElementById('iEmp').value||0,mach=+document.getElementById('iMach').value||0,sh=+document.querySelector('input[name="sh"]:checked').value,wd=+document.getElementById('iDays').value||240,lc=+document.getElementById('iLC').value||0,mr=+document.getElementById('iMR').value||0,schH=+document.getElementById('iSch').value||0,repH=+document.getElementById('iRep').value||0,dtH=+document.getElementById('iDT').value||0,qi=+document.getElementById('iQI').value||0,ic=+iS.value||500,ma=document.querySelector('input[name="mt"]:checked').value,mc=+document.getElementById('iMC').value||0,M=mods(),wk=Math.round(wd/5),R=[];let tH=0,tD=0;
    if(M.includes('scheduling')&&schH>0){const s=schH*.55*wk,v=s*lc;tH+=s;R.push({a:L==='sl'?'Planiranje proizvodnje':'Production Scheduling',b:'55%',v})}
    if((M.includes('shopfloor')||M.includes('oee'))&&repH>0){const s=repH*.60*wk,v=s*lc;tH+=s;R.push({a:L==='sl'?'Poročanje in vnos podatkov':'Reporting & Data Entry',b:'60%',v})}
    if((M.includes('maintenance')||M.includes('oee'))&&dtH>0){const p=(M.includes('maintenance')&&M.includes('oee'))?0.15:0.10,s=dtH*p*12,v=s*mr;tD=s;R.push({a:L==='sl'?'Zmanjšanje zastojev':'Downtime Reduction',b:Math.round(p*100)+'%',v})}
    if(M.includes('maintenance')&&mc>0){let p=.12;if(ma==='mixed')p=.08;if(ma==='preventive')p=.03;R.push({a:L==='sl'?'Stroški vzdrževanja (AFIM)':'Maintenance Costs (AFIM)',b:Math.round(p*100)+'%',v:mc*p})}
    if((M.includes('quality')||M.includes('traceability'))&&qi>0){let p=.15;if(M.includes('quality')&&M.includes('traceability'))p=.25;else if(M.includes('quality'))p=.20;R.push({a:L==='sl'?'Kakovost in popravila':'Quality & Rework',b:Math.round(p*100)+'%',v:qi*p*12*ic})}
    if(M.includes('andon')&&dtH>0&&mr>0){R.push({a:L==='sl'?'Andon odzivni čas':'Andon Response Time',b:'8%',v:dtH*.08*12*mr})}
    if(M.includes('tooling')&&mach>0){R.push({a:L==='sl'?'Upravljanje orodij':'Tool Management',b:'~150 €/'+(L==='sl'?'stroj':'mach.'),v:mach*150})}
    if(M.includes('shopfloor')&&emp>0){const al=emp*lc*8*sh*wd,v=al*.02;tH+=Math.round(v/lc);R.push({a:L==='sl'?'Produktivnost':'Productivity',b:'2%',v})}
    if(M.includes('skills')&&emp>0){const s=emp*1.5,v=s*lc;tH+=s;R.push({a:L==='sl'?'Matrika kompetenc':'Skill Matrix',b:'1.5h/'+(L==='sl'?'zaposl.':'empl.'),v})}
    R.sort((a,b)=>b.v-a.v);const tot=R.reduce((s,r)=>s+r.v,0);
    document.getElementById('rT').textContent=fmt(tot);document.getElementById('rM').textContent=fmt(tot/12)+' / '+(L==='sl'?'mesec':'month');document.getElementById('mH').textContent=Math.round(tH).toLocaleString('de-DE');document.getElementById('mD').textContent=Math.round(tD).toLocaleString('de-DE');
    const ec=400+M.length*120,pb=tot>0?Math.round(ec*12/(tot/12*12)):0;document.getElementById('mP').textContent=pb&&pb<=24?pb+' '+(L==='sl'?'mes.':'mo.'):'< 2 '+(L==='sl'?'leti':'yrs');
    const tb=document.getElementById('tB');tb.innerHTML='';R.forEach(r=>{const tr=document.createElement('tr');tr.innerHTML='<td>'+r.a+'</td><td>'+r.b+'</td><td>'+fmt(r.v)+'</td>';tb.appendChild(tr)});const ft=document.createElement('tr');ft.innerHTML='<td>'+(L==='sl'?'SKUPAJ LETNO':'TOTAL ANNUAL')+'</td><td></td><td>'+fmt(tot)+'</td>';tb.appendChild(ft);
    lastResults={emp,mach,sh,wd,lc,mr,schH,repH,dtH,qi,ic,ma,mc,M,R,tot,tH,tD,pb,company:document.getElementById('iName').value,industry:document.getElementById('iInd').value};
    nav(4);
}
function loadScript(url){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=url;s.onload=res;s.onerror=rej;document.head.appendChild(s)})}

async function loadPdfLibs(){
    if(window.jspdf)return true;
    const cdns=[
        ['https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js','https://unpkg.com/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js'],
        ['https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js','https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js'],
        ['https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js','https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js']
    ];
    for(const [a,b] of cdns){
        try{await loadScript(a);await loadScript(b);if(window.jspdf)return true}catch(e){continue}
    }
    return false;
}

async function lead(){
    const email=document.getElementById('cE').value;
    if(!email||!email.includes('@')){document.getElementById('cE').style.borderColor='#dc2626';return}
    if(!lastResults)return;

    // Show loading state
    const btn=document.querySelector('#cF .btn');
    const origText=btn.textContent;
    btn.textContent=L==='sl'?'Nalagam...':'Loading...';
    btn.disabled=true;

    // Load PDF libs if needed
    const loaded=await loadPdfLibs();
    if(!loaded){
        btn.textContent=origText;btn.disabled=false;
        const errDiv=document.getElementById('cO');
        errDiv.textContent=L==='sl'?'Napaka pri nalaganju PDF knjižnice. Prosimo poskusite znova.':'Error loading PDF library. Please try again.';
        errDiv.style.color='#dc2626';errDiv.classList.add('show');
        return;
    }

    const d=lastResults,sl=L==='sl';
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:'mm',format:'a4'});
    const W=210,H=297,M=20,CW=W-2*M;
    const pri=[26,86,219],green=[13,138,94],gray=[90,97,120],lgray=[139,145,165],dark=[26,31,46];
    let y=M;

    function addPage(){doc.addPage();y=M}
    function txt(t,x,yy,opt={}){
        doc.setFont('helvetica',opt.bold?'bold':'normal');
        doc.setFontSize(opt.size||10);
        doc.setTextColor(...(opt.color||dark));
        if(opt.align==='right')doc.text(t,x,yy,{align:'right'});
        else if(opt.align==='center')doc.text(t,x,yy,{align:'center'});
        else doc.text(t,x,yy);
    }
    function line(y1,color){doc.setDrawColor(...(color||[226,229,235]));doc.setLineWidth(0.3);doc.line(M,y1,W-M,y1)}
    function fmtP(n){return Math.round(n).toLocaleString('de-DE')+' €'}

    // ─── Header bar ───
    doc.setFillColor(26,31,46);
    doc.rect(0,0,W,16,'F');
    txt('PROMIGRA',M,10.5,{size:12,bold:true,color:[255,255,255]});
    txt('promigra.com',W-M,10.5,{size:8,color:[180,185,200],align:'right'});

    y=28;

    // ─── Title ───
    txt(sl?'Poročilo o donosnosti digitalizacije proizvodnje':'Manufacturing Digitalization ROI Report',M,y,{size:18,bold:true,color:dark});
    y+=8;
    const dateStr=new Date().toLocaleDateString(sl?'sl-SI':'en-GB',{year:'numeric',month:'long',day:'numeric'});
    txt((sl?'Pripravljeno: ':'Prepared: ')+dateStr,M,y,{size:9,color:lgray});
    if(d.company){y+=5;txt((sl?'Podjetje: ':'Company: ')+d.company,M,y,{size:9,color:lgray})}
    y+=4;
    line(y);
    y+=10;

    // ─── Big number ───
    doc.setFillColor(232,247,240);
    doc.roundedRect(M,y,CW,32,3,3,'F');
    txt(sl?'Ocenjeni letni prihranki':'Estimated Annual Savings',W/2,y+10,{size:11,color:gray,align:'center'});
    txt(fmtP(d.tot),W/2,y+24,{size:28,bold:true,color:green,align:'center'});
    y+=40;

    // ─── Key metrics ───
    const metrics=[
        {label:sl?'Prihr. ur / leto':'Hours saved / year',val:Math.round(d.tH).toLocaleString('de-DE')},
        {label:sl?'Manj ur zastojev':'Less downtime hrs',val:Math.round(d.tD).toLocaleString('de-DE')},
        {label:sl?'Oce. povračilo':'Est. payback',val:d.pb&&d.pb<=24?d.pb+(sl?' mes.':' mo.'):'< 2 '+(sl?'leti':'yrs')},
        {label:sl?'Mesečni prihranek':'Monthly savings',val:fmtP(d.tot/12)}
    ];
    const mw=CW/4;
    metrics.forEach((m,i)=>{
        const mx=M+i*mw;
        txt(m.val,mx+mw/2,y+4,{size:13,bold:true,color:dark,align:'center'});
        txt(m.label,mx+mw/2,y+10,{size:7,color:lgray,align:'center'});
    });
    y+=18;
    line(y);
    y+=8;

    // ─── Company profile ───
    txt(sl?'Profil proizvodnje':'Production Profile',M,y,{size:12,bold:true});
    y+=7;
    const indLabels={general:sl?'Splošna proizvodnja':'General manufacturing',automotive:sl?'Avtomobilska':'Automotive',plastics:sl?'Plastika':'Plastics',metal:sl?'Obdelava kovin':'Metal processing',electronics:sl?'Elektronika':'Electronics',food:sl?'Živilska':'Food & Beverage',pharma:sl?'Farmacija':'Pharma/Medical',other:sl?'Drugo':'Other'};
    const maintLabels={reactive:sl?'Večinoma kurativno':'Mostly reactive',mixed:sl?'Mešano':'Mixed',preventive:sl?'Večinoma preventivno':'Mostly preventive'};
    const profile=[
        [sl?'Zaposleni v proizvodnji':'Production employees',d.emp],
        [sl?'Stroji / delovna mesta':'Machines / work centers',d.mach],
        [sl?'Izmene':'Shifts',d.sh],
        [sl?'Delovnih dni / leto':'Working days / year',d.wd],
        [sl?'Urna cena dela':'Hourly labor cost',d.lc+' €/h'],
        [sl?'Strojna ura':'Machine hour rate',d.mr+' €/h'],
        [sl?'Panoga':'Industry',indLabels[d.industry]||d.industry],
        [sl?'Pristop k vzdrževanju':'Maintenance approach',maintLabels[d.ma]||d.ma]
    ];
    profile.forEach(r=>{
        txt(r[0],M,y,{size:9,color:gray});
        txt(String(r[1]),W-M,y,{size:9,bold:true,align:'right'});
        y+=5.5;
    });
    y+=4;
    line(y);
    y+=8;

    // ─── Breakdown table ───
    txt(sl?'Razčlenitev prihrankov':'Savings Breakdown',M,y,{size:12,bold:true});
    y+=4;
    const tableRows=d.R.map(r=>[r.a,r.b,fmtP(r.v)]);
    tableRows.push([{content:sl?'SKUPAJ LETNO':'TOTAL ANNUAL',styles:{fontStyle:'bold'}},{content:'',styles:{}},{content:fmtP(d.tot),styles:{fontStyle:'bold',textColor:green}}]);

    doc.autoTable({
        startY:y,
        margin:{left:M,right:M},
        head:[[sl?'Področje':'Area',sl?'Merilo':'Benchmark',sl?'Letni prihranek':'Annual Savings']],
        body:tableRows,
        styles:{font:'helvetica',fontSize:9,cellPadding:3,lineColor:[226,229,235],lineWidth:0.2},
        headStyles:{fillColor:[248,249,251],textColor:dark,fontStyle:'bold',fontSize:8},
        columnStyles:{0:{cellWidth:'auto'},1:{cellWidth:30,halign:'right'},2:{cellWidth:35,halign:'right',textColor:green}},
        theme:'grid',
        didParseCell:function(data){if(data.row.index===tableRows.length-1){data.cell.styles.fillColor=[248,249,251]}}
    });
    y=doc.lastAutoTable.finalY+10;

    // ─── Check if need new page ───
    if(y>H-80)addPage();

    // ─── EU Grant box ───
    doc.setFillColor(254,243,226);
    doc.roundedRect(M,y,CW,22,3,3,'F');
    doc.setDrawColor(245,217,168);
    doc.roundedRect(M,y,CW,22,3,3,'S');
    txt(sl?'EU sofinanciranje':'EU Co-financing',M+5,y+6,{size:9,bold:true,color:[180,83,9]});
    const grantText=sl
        ?'Slovenska proizvodna MSP-ja lahko dostopajo do 50% sofinanciranja naložb v digitalizacijo prek programov kot je P4D (SPS). Stroški naročnin programske opreme so lahko upravičeni. Več: podjetniskisklad.si'
        :'Slovenian manufacturing SMEs can access up to 50% co-financing for digitalization investments through programs like P4D (SPS). Software subscription costs may be eligible. More: podjetniskisklad.si';
    const grantLines=doc.splitTextToSize(grantText,CW-10);
    doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(...gray);
    doc.text(grantLines,M+5,y+12);
    y+=30;

    if(y>H-70)addPage();

    // ─── Methodology ───
    txt(sl?'Metodologija':'Methodology',M,y,{size:12,bold:true});
    y+=7;
    const methods=[
        [sl?'Planiranje (55%)':'Scheduling (55%)',sl?'Panožna poročila: 50-70% zmanjšanje ročnega planiranja ob prehodu na APS. Uporabljamo 55%.':'Industry reports: 50-70% reduction in manual scheduling with APS. We use 55%.'],
        [sl?'Poročanje (60%)':'Reporting (60%)',sl?'Avtomatizirano zajemanje podatkov odpravi 60-80% ročnega poročanja (Deloitte). Uporabljamo 60%.':'Automated data capture eliminates 60-80% of manual reporting (Deloitte). We use 60%.'],
        [sl?'Zastoji (15%)':'Downtime (15%)',sl?'PwC: prediktivno vzdrževanje zmanjša zastoje 30-50%. CMMS preventivno: 15-25%. Uporabljamo 15%.':'PwC: predictive maintenance reduces downtime 30-50%. CMMS preventive: 15-25%. We use 15%.'],
        [sl?'Vzdrževanje (12%)':'Maintenance (12%)',sl?'AFIM in Reliable Plant: 12-18% prihranka pri prehodu kurativno → preventivno.':'AFIM & Reliable Plant: 12-18% savings transitioning reactive → preventive.'],
        [sl?'Kakovost (20%)':'Quality (20%)',sl?'8D + digitalna sledljivost: 20-35% manj ponavljajočih se težav. Uporabljamo 20%.':'8D + digital traceability: 20-35% fewer recurring issues. We use 20%.'],
        [sl?'Produktivnost (2%)':'Productivity (2%)',sl?'McKinsey Industrija 4.0: 3-5% izboljšanje. Uporabljamo konzervativna 2%.':'McKinsey Industry 4.0: 3-5% labor gains. We use conservative 2%.']
    ];
    methods.forEach(m=>{
        if(y>H-20)addPage();
        txt(m[0],M,y,{size:8,bold:true,color:dark});
        y+=4;
        const mLines=doc.splitTextToSize(m[1],CW);
        doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(...lgray);
        doc.text(mLines,M,y);
        y+=mLines.length*3.5+3;
    });

    y+=4;
    doc.setFillColor(248,249,251);
    doc.roundedRect(M,y,CW,12,2,2,'F');
    const disc=sl?'To so ocene, ne garancije. Dejanski prihranki so odvisni od zrelosti procesov, obsega implementacije in organizacijske pripravljenosti.':'These are estimates, not guarantees. Actual savings depend on process maturity, implementation scope, and organizational readiness.';
    const discLines=doc.splitTextToSize(disc,CW-8);
    doc.setFont('helvetica','italic');doc.setFontSize(7);doc.setTextColor(...lgray);
    doc.text(discLines,M+4,y+5);
    y+=18;

    // ─── CTA ───
    if(y>H-35)addPage();
    line(y);
    y+=8;
    txt(sl?'Naslednji korak':'Next Step',M,y,{size:12,bold:true});
    y+=7;
    const ctaTxt=sl
        ?'Želite podrobnejšo analizo za vaše podjetje? Kontaktirajte nas za brezplačen posvet o digitalizaciji vaše proizvodnje.'
        :'Want a deeper analysis for your company? Contact us for a free consultation on digitalizing your production.';
    const ctaLines=doc.splitTextToSize(ctaTxt,CW);
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(...gray);
    doc.text(ctaLines,M,y);
    y+=ctaLines.length*4+6;
    txt('info@promigra.com  |  promigra.com',M,y,{size:9,bold:true,color:pri});

    // ─── Footer on all pages ───
    const pages=doc.internal.getNumberOfPages();
    for(let i=1;i<=pages;i++){
        doc.setPage(i);
        doc.setFontSize(7);doc.setTextColor(...lgray);doc.setFont('helvetica','normal');
        doc.text('© '+new Date().getFullYear()+' Promigra d.o.o. | promigra.com',M,H-10);
        doc.text((sl?'Stran ':'Page ')+i+'/'+pages,W-M,H-10,{align:'right'});
    }

    // ─── Save PDF ───
    const fname=(d.company?d.company.replace(/[^a-zA-Z0-9]/g,'_')+'_':'')+'Promigra_ROI_Report.pdf';
    doc.save(fname);

    // ─── Send lead data ───
    // REPLACE with your Formspree endpoint:
    // fetch('https://formspree.io/f/YOUR_ID',{
    //     method:'POST',
    //     headers:{'Content-Type':'application/json'},
    //     body:JSON.stringify({
    //         email,company:d.company,industry:d.industry,
    //         employees:d.emp,machines:d.mach,
    //         total_savings:fmtP(d.tot),hours_saved:Math.round(d.tH),
    //         modules:d.M.join(', '),
    //         _subject:'ROI Calculator Lead – '+(d.company||email)
    //     })
    // });

    console.log('Lead:',{email,company:d.company,industry:d.industry,employees:d.emp,savings:fmtP(d.tot),modules:d.M});
    document.getElementById('cF').style.display='none';
    document.getElementById('cO').classList.add('show');
    setLang(L);
}
function reset(){document.querySelectorAll('input[type=number]').forEach(i=>i.value='');document.getElementById('iName').value='';iS.value=500;iD.textContent='500 €';document.getElementById('iDays').value='240';clearErrors();nav(1)}
document.querySelectorAll('input[type=number]').forEach(i=>{i.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();if(S<3)go(S+1);else if(S===3)calc()}})});
setLang('en');
</script>
